name: OSSGuard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: kirankotari/ossguard-app@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
